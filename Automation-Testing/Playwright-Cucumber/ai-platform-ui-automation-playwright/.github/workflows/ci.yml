name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      run_ui_tests:
        description: "Run UI smoke tests"
        required: false
        default: "false"

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  ui-smoke-tests:
    name: UI Smoke Tests
    runs-on: ubuntu-latest
    needs: typecheck
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_ui_tests == 'true'
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      TEST_EMAIL: ${{ vars.TEST_EMAIL }}
      OTP_MODE: ${{ vars.OTP_MODE || 'static' }}
      OTP_CODE: ${{ secrets.OTP_CODE }}
      HEADLESS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI smoke tests
        run: npm run test:smoke
